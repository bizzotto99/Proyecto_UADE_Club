spring:
  application:
    name: camisetas
  datasource:
    url: jdbc:mysql://localhost:3306/camisetas_db?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      data-locations: classpath:import.sql
  jpa.defer-datasource-initialization: true

server:
  port: 8080
